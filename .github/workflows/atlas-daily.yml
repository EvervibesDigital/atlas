name: atlas-daily

# Runs one autonomous ATLAS cycle every day. Offline-safe: it drafts content and
# builds the approval list but posts nothing. Add free LLM keys as repo secrets
# (GROQ_API_KEY / GEMINI_API_KEY / OPENROUTER_API_KEY) to use real models.
on:
  schedule:
    - cron: "0 13 * * *" # 13:00 UTC daily
  workflow_dispatch:

jobs:
  cycle:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm cycle
